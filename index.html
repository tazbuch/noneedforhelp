<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Background</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        /* Best balance: fills screen without stretching */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* fills screen cleanly */
        }
    </style>
</head>
<body>

    <!-- GIF -->
    <img src="noneedfor.help/media/background.gif" class="bg">

    <!-- AUDIO -->
    <audio id="music" autoplay loop muted playsinline>
        <source src="noneedfor.help/media/song.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById("music");

        // try to unmute ASAP when browser allows it
        function tryUnmute() {
            audio.muted = false;
            audio.play().catch(() => {});
        }

        document.addEventListener("click", tryUnmute);
        document.addEventListener("mousemove", tryUnmute);
    </script>

</body>
</html>
