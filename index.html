<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Background</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        /* Properly scaled GIF */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; /* prevents zoom/crop */
        }
    </style>
</head>
<body>

    <!-- GIF -->
    <img src="noneedfor.help/media/background.gif" class="bg">

    <!-- Audio -->
    <audio autoplay loop>
        <source src="noneedfor.help/media/song.mp3" type="audio/mpeg">
    </audio>

</body>
</html>
