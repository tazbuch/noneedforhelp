<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>no need for help.</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }
    </style>
</head>
<body>

    <img src="https://noneedfor.help/media/background.gif" class="bg">

    <audio autoplay loop>
        <source src="https://noneedfor.help/media/song.mp3" type="audio/mpeg">
    </audio>

</body>
</html>
